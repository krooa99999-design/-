<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 เกมทายเครื่องดนตรี</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: #F0EDF8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 2rem 1rem; }
  h1 { font-size: 28px; font-weight: 700; color: #26215C; text-align: center; margin-bottom: 4px; }
  .subtitle { font-size: 15px; color: #7F77DD; text-align: center; margin-bottom: 1.5rem; }
  .container { width: 100%; max-width: 560px; }
  .score-row { display: flex; justify-content: space-between; font-size: 13px; color: #534AB7; font-weight: 500; margin-bottom: 6px; }
  .progress-bar { background: #CECBF6; border-radius: 99px; height: 8px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { background: linear-gradient(90deg, #534AB7, #7F77DD); height: 100%; border-radius: 99px; transition: width 0.4s ease; }
  .card { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 4px 24px rgba(83,74,183,0.10); margin-bottom: 1rem; }
  .emoji-wrap { font-size: 80px; text-align: center; margin-bottom: 0.75rem; display: block; line-height: 1.1; }
  .desc { font-size: 14px; color: #888; text-align: center; margin-bottom: 1.25rem; }
  .q-text { font-size: 17px; font-weight: 700; color: #26215C; text-align: center; margin-bottom: 1.5rem; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .opt { background: #F0EDF8; border: 2px solid #CECBF6; border-radius: 12px; padding: 12px 10px; font-size: 14px; font-family: 'Sarabun', sans-serif; color: #3C3489; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.15s; line-height: 1.4; }
  .opt:hover:not(:disabled) { background: #EEEDFE; border-color: #7F77DD; transform: translateY(-1px); }
  .opt.correct { background: #EAF3DE; border-color: #3B6D11; color: #3B6D11; }
  .opt.wrong { background: #FCEBEB; border-color: #A32D2D; color: #A32D2D; }
  .opt:disabled { cursor: default; }
  .feedback { margin-top: 12px; text-align: center; font-size: 15px; font-weight: 500; padding: 10px 16px; border-radius: 10px; }
  .feedback.ok { background: #EAF3DE; color: #3B6D11; }
  .feedback.no { background: #FCEBEB; color: #A32D2D; }
  .next-btn { display: block; width: 100%; padding: 14px; background: #534AB7; color: white; border: none; border-radius: 14px; font-size: 16px; font-family: 'Sarabun', sans-serif; font-weight: 700; cursor: pointer; margin-top: 1rem; transition: opacity 0.15s, transform 0.1s; }
  .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .result-card { background: white; border-radius: 20px; padding: 2.5rem 2rem; box-shadow: 0 4px 24px rgba(83,74,183,0.10); text-align: center; }
  .big-emoji { font-size: 64px; display: block; margin-bottom: 0.75rem; }
  .big-score { font-size: 48px; font-weight: 700; color: #534AB7; margin-bottom: 6px; }
  .score-sub { font-size: 15px; color: #7F77DD; margin-bottom: 8px; }
  .msg { font-size: 17px; font-weight: 700; color: #26215C; margin-bottom: 1.5rem; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 1.5rem; }
  .tag { font-size: 12px; padding: 4px 10px; border-radius: 99px; font-weight: 500; }
  .tag.ok { background: #EAF3DE; color: #3B6D11; }
  .tag.no { background: #FCEBEB; color: #A32D2D; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .btn-primary { padding: 12px 28px; background: #534AB7; color: white; border: none; border-radius: 12px; font-size: 15px; font-family: 'Sarabun', sans-serif; font-weight: 700; cursor: pointer; }
  .btn-outline { padding: 12px 28px; background: white; color: #534AB7; border: 2px solid #534AB7; border-radius: 12px; font-size: 15px; font-family: 'Sarabun', sans-serif; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
  <h1>🎵 เกมทายเครื่องดนตรี</h1>
  <p class="subtitle">ทายชื่อเครื่องดนตรีจากภาพ — 20 ข้อ</p>
  <div id="app"></div>
</div>
<script>
const instruments = [
  { name:"Accordion", th:"แอคคอร์เดียน", emoji:"🪗", desc:"เครื่องดนตรีที่บีบขยายได้ มีปุ่มและลิ้นชัก" },
  { name:"Bagpipe", th:"แบกไพพ์", emoji:"🎶", desc:"เครื่องดนตรีสก็อต มีถุงลมและท่อหลายอัน" },
  { name:"Banjo", th:"แบนโจ", emoji:"🪕", desc:"กีตาร์ทรงกลม นิยมในดนตรีคันทรี" },
  { name:"Bass Guitar", th:"กีตาร์เบส", emoji:"🎸", desc:"กีตาร์เสียงต่ำ มี 4 สาย" },
  { name:"Bongo", th:"บองโก้", emoji:"🥁", desc:"กลองเล็กคู่จากแอฟริกา/คิวบา" },
  { name:"Bugle", th:"บิวเกิล", emoji:"📯", desc:"แตรทองเหลืองไม่มีวาล์ว" },
  { name:"Cello", th:"เชลโล่", emoji:"🎻", desc:"เครื่องสายขนาดกลาง เล่นด้วยคันชัก" },
  { name:"Clarinet", th:"คลาริเน็ต", emoji:"🎵", desc:"เครื่องเป่าไม้ ลิ้นเดียว ทรงยาวสีดำ" },
  { name:"Classical Guitar", th:"กีตาร์คลาสสิก", emoji:"🎸", desc:"กีตาร์สายไนลอน เล่นดนตรีคลาสสิก" },
  { name:"Cymbal", th:"ฉาบ", emoji:"🥁", desc:"แผ่นโลหะกลมสำหรับตี" },
  { name:"Drum Set", th:"กลองชุด", emoji:"🥁", desc:"ชุดกลองหลายใบรวมกัน" },
  { name:"Drum", th:"กลอง", emoji:"🥁", desc:"กลองทรงกระบอกตีด้วยไม้" },
  { name:"Flute", th:"ฟลูต", emoji:"🎵", desc:"เครื่องเป่าไม้แนวนอน เสียงใส" },
  { name:"Guitar", th:"กีตาร์", emoji:"🎸", desc:"เครื่องดนตรี 6 สาย ยอดนิยม" },
  { name:"Harp", th:"พิณ", emoji:"🎵", desc:"เครื่องสายขนาดใหญ่ รูปสามเหลี่ยม" },
  { name:"Keyboard", th:"คีย์บอร์ด", emoji:"🎹", desc:"เปียโนไฟฟ้าแบบพกพา" },
  { name:"Mandolin", th:"แมนโดลิน", emoji:"🪕", desc:"เครื่องสาย 8 สาย ทรงน้ำตา" },
  { name:"Maraca", th:"มาราคัส", emoji:"🎶", desc:"เครื่องเขย่าสไตล์ลาตินอเมริกา" },
  { name:"Oboe", th:"โอโบ", emoji:"🎵", desc:"เครื่องเป่าไม้ ลิ้นคู่ เสียงแหลม" },
  { name:"Piano", th:"เปียโน", emoji:"🎹", desc:"เครื่องดนตรีคีย์บอร์ดขนาดใหญ่" },
  { name:"Saxophone", th:"แซกโซโฟน", emoji:"🎷", desc:"เครื่องเป่าทองเหลือง เสียงแจ๊ส" },
  { name:"Snare Drum", th:"กลองสแนร์", emoji:"🥁", desc:"กลองเล็กมีสายขึงด้านล่าง" },
  { name:"Trombone", th:"ทรอมโบน", emoji:"📯", desc:"แตรทองเหลือง เลื่อนท่อได้" },
  { name:"Trumpet", th:"ทรัมเป็ต", emoji:"🎺", desc:"แตรทองเหลือง มี 3 วาล์ว" },
  { name:"Xylophone", th:"ไซโลโฟน", emoji:"🎵", desc:"เครื่องตีไม้เรียงแถว" },
  { name:"Violin", th:"ไวโอลิน", emoji:"🎻", desc:"เครื่องสายขนาดเล็ก เล่นด้วยคันชัก" },
  { name:"Tuba", th:"ทูบา", emoji:"📯", desc:"แตรทองเหลืองขนาดใหญ่ เสียงต่ำ" },
  { name:"Triangle", th:"สามเหลี่ยม", emoji:"🔔", desc:"เครื่องกระทบโลหะรูปสามเหลี่ยม" }
];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

let questions=[], current=0, score=0, answered=false, results=[];

function init(){
  questions=shuffle(instruments).slice(0,20).map(inst=>{
    const others=shuffle(instruments.filter(x=>x.name!==inst.name)).slice(0,3);
    return {correct:inst, choices:shuffle([inst,...others])};
  });
  current=0;score=0;answered=false;results=[];render();
}

function render(){
  const el=document.getElementById('app');
  if(current>=questions.length){renderResult(el);return;}
  const q=questions[current];
  const pct=Math.round(current/questions.length*100);
  el.innerHTML=`
    <div class="score-row"><span>ข้อที่ ${current+1} / ${questions.length}</span><span>คะแนน: ${score}</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card">
      <span class="emoji-wrap">${q.correct.emoji}</span>
      <p class="desc">${q.correct.desc}</p>
      <p class="q-text">เครื่องดนตรีชนิดนี้คืออะไร?</p>
      <div class="options">
        ${q.choices.map(c=>`<button class="opt" onclick="choose('${c.name}')" data-name="${c.name}">${c.name}<br><small style="font-weight:400;color:#7F77DD">${c.th}</small></button>`).join('')}
      </div>
      <div id="fb"></div>
    </div>
    <button class="next-btn" id="nb" onclick="nextQ()" style="display:none">${current<questions.length-1?'ข้อถัดไป →':'ดูผลคะแนน 🎉'}</button>
  `;
}

function choose(name){
  if(answered)return;
  answered=true;
  const q=questions[current];
  const ok=name===q.correct.name;
  if(ok)score++;
  results.push({name:q.correct.name,correct:ok});
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.dataset.name===q.correct.name)b.classList.add('correct');
    else if(b.dataset.name===name&&!ok)b.classList.add('wrong');
  });
  document.getElementById('fb').innerHTML=ok
    ?'<div class="feedback ok">✅ ถูกต้อง! เก่งมาก</div>'
    :`<div class="feedback no">❌ คำตอบที่ถูกคือ <strong>${q.correct.name}</strong> (${q.correct.th})</div>`;
  document.getElementById('nb').style.display='block';
}

function nextQ(){current++;answered=false;render();}

function getMsg(s){
  if(s>=18)return{e:"🏆",m:"ยอดเยี่ยมมาก! คุณเป็นผู้เชี่ยวชาญด้านดนตรี!"};
  if(s>=14)return{e:"🌟",m:"ดีมาก! ความรู้ดนตรีของคุณแข็งแกร่งมาก!"};
  if(s>=10)return{e:"👍",m:"ผ่านได้! ลองฝึกเพิ่มเติมอีกนิดนึงนะ"};
  return{e:"💪",m:"ไม่เป็นไร! ลองใหม่อีกครั้งได้เลย"};
}

function renderResult(el){
  const{e,m}=getMsg(score);
  const okTags=results.filter(r=>r.correct).map(r=>`<span class="tag ok">✓ ${r.name}</span>`).join('');
  const noTags=results.filter(r=>!r.correct).map(r=>`<span class="tag no">✗ ${r.name}</span>`).join('');
  el.innerHTML=`
    <div class="result-card">
      <span class="big-emoji">${e}</span>
      <div class="big-score">${score} / ${questions.length}</div>
      <div class="score-sub">ถูก ${score} ข้อ | ผิด ${questions.length-score} ข้อ</div>
      <div class="msg">${m}</div>
      <div class="tags">${okTags}${noTags}</div>
      <div class="btn-row">
        <button class="btn-primary" onclick="init()">🔄 เล่นใหม่</button>
        <button class="btn-outline" onclick="dl()">⬇️ ดาวน์โหลดผล</button>
      </div>
    </div>
  `;
}

function dl(){
  const{m}=getMsg(score);
  const lines=[
    '🎵 ผลการทดสอบ: เกมทายเครื่องดนตรี',
    '='.repeat(40),
    `คะแนน: ${score} / ${questions.length}`,
    `ประเมิน: ${m}`,
    '',
    '✅ ตอบถูก:',
    ...results.filter(r=>r.correct).map(r=>`  • ${r.name}`),
    '',
    '❌ ตอบผิด:',
    ...results.filter(r=>!r.correct).map(r=>`  • ${r.name}`),
    '',
    `วันที่: ${new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'})}`
  ];
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='ผลทดสอบเครื่องดนตรี.txt';
  a.click();
}

init();
</script>
</body>
</html>
